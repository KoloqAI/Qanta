services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:create_app --factory --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quanta:quanta@postgres:5432/quanta
      DATABASE_URL_SYNC: postgresql://quanta:quanta@postgres:5432/quanta
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./app:/app/app
      - ./config:/app/config
      - ./alembic:/app/alembic
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: arq app.workers.main.WorkerSettings
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://quanta:quanta@postgres:5432/quanta
      DATABASE_URL_SYNC: postgresql://quanta:quanta@postgres:5432/quanta
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
    volumes:
      - ./app:/app/app
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./web/src:/app/src
      - ./web/index.html:/app/index.html
    environment:
      API_PROXY_TARGET: http://api:8000

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quanta
      POSTGRES_PASSWORD: quanta
      POSTGRES_DB: quanta
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quanta"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama

volumes:
  pgdata:
  redisdata:
  ollama_models:
