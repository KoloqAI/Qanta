id: time_of_day_bias
name: Time-of-day bias
family: time_microstructure
horizon: intraday
thesis: "Exploit the well-documented U-shaped intraday volume pattern; buy the open dip, sell into the close."
watches: [close, open, atr, avg_volume, time_of_day]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.3] }

entry:
  when:
    all_of:
      - { lt: ["close", "open"] }
      - { gt: ["avg_volume(20)", 1000000] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 3.0

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: "{tp_atr}"
  - time_stop:
      sessions: 1
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 2.0
  max_position_pct: 3.0
  max_gross_exposure: 25.0

param_grid:
  tp_atr: { min: 0.5, max: 1.5, step: 0.25, default: 1.0 }
  stop_atr: { min: 0.3, max: 0.8, step: 0.1, default: 0.5 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.3] }

peers_hint: sector_or_corr
default_universe:
  min_price: 10
  min_dollar_volume: 10000000
