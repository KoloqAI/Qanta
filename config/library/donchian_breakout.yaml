id: donchian_breakout
name: Donchian channel breakout
family: momentum_trend
horizon: swing
thesis: "Buy breakout above the N-day high channel; classic trend-following with range expansion."
watches: [close, rolling_high, rolling_low, atr, avg_volume, adx]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["adx(14)", 20] }

entry:
  when:
    all_of:
      - { gt: ["close", "rolling_high({channel_n})"] }
      - { gt: ["adx(14)", "{adx_min}"] }
  action: enter_long
  sizing:
    vol_scaled:
      target_vol: 0.10

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 3.0
  - time_stop:
      sessions: 20
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 4.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  channel_n: { min: 10, max: 40, step: 5, default: 20 }
  adx_min: { min: 15, max: 30, step: 5, default: 25 }
  stop_atr: { min: 1.0, max: 2.5, step: 0.25, default: 1.5 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["adx(14)", 20] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
