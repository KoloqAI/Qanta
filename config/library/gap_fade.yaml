id: gap_fade
name: Gap fade
family: mean_reversion
horizon: intraday
thesis: "Fade overnight gaps that open beyond the prior range; gaps tend to fill intraday on liquid stocks."
watches: [close, open, high, low, atr, avg_volume]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.5] }

entry:
  when:
    all_of:
      - { lt: ["open", "rolling_low(5)"] }
      - { gt: ["avg_volume(20)", 1000000] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 4.0

exits:
  - stop_loss:
      atr_mult: 0.8
  - take_profit:
      atr_mult: 1.5
  - time_stop:
      sessions: 1
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 3.0
  max_position_pct: 4.0
  max_gross_exposure: 30.0

param_grid:
  gap_threshold: { min: 0.5, max: 2.0, step: 0.25 }
  stop_atr: { min: 0.5, max: 1.2, step: 0.1 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.5] }

peers_hint: sector_or_corr
default_universe:
  min_price: 10
  min_dollar_volume: 10000000
