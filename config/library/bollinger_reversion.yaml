id: bollinger_reversion
name: Bollinger band reversion
family: mean_reversion
horizon: both
thesis: "Enter when price touches or breaches the lower Bollinger band; exit at the mid-band or upper band."
watches: [close, bollinger, atr, avg_volume, realized_vol]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { between: ["realized_vol(20)", 0.10, 0.50] }

entry:
  when:
    all_of:
      - { lt: ["close", "bollinger({bb_period},{bb_width}).lower"] }
  action: enter_long
  sizing:
    vol_scaled:
      target_vol: 0.08

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 2.0
  - time_stop:
      sessions: 8
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 3.5
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  bb_period: { min: 15, max: 30, step: 5, default: 20 }
  bb_width: { min: 1.5, max: 2.5, step: 0.5, default: 2 }
  stop_atr: { min: 0.8, max: 1.5, step: 0.1, default: 1.0 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { lt: ["close", "bollinger(20,2).lower"] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
