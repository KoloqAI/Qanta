id: rsi_reversion
name: RSI oversold reversion
family: mean_reversion
horizon: swing
thesis: "Buy when RSI dips into oversold territory on liquid names; mean-reversion in range-bound regimes."
watches: [close, rsi, atr, avg_volume, realized_vol]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { between: ["realized_vol(20)", 0.10, 0.50] }

entry:
  when:
    all_of:
      - { lt: ["rsi({rsi_period})", "{rsi_threshold}"] }
      - { gt: ["avg_volume(20)", 500000] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 5.0

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 2.5
  - time_stop:
      sessions: 10
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 4.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  rsi_period: { min: 7, max: 21, step: 2, default: 14 }
  rsi_threshold: { min: 20, max: 35, step: 5, default: 25 }
  stop_atr: { min: 0.8, max: 1.5, step: 0.1, default: 1.2 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { lt: ["rsi(14)", 30] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
