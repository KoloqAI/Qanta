id: liquidity_regime_filter
name: Liquidity regime filter
family: structural_filter
horizon: both
thesis: "Only trade when liquidity is sufficient; avoid thin markets where slippage destroys edge."
watches: [close, avg_volume, volume, atr, realized_vol]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["volume", "avg_volume(20)"] }

entry:
  when:
    all_of:
      - { gt: ["avg_volume(20)", 1000000] }
      - { gt: ["volume", "avg_volume(20)"] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 5.0

exits:
  - stop_loss:
      atr_mult: 1.5
  - time_stop:
      sessions: 10
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 4.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  min_avg_vol: { min: 500000, max: 2000000, step: 250000 }
  vol_ratio: { min: 0.8, max: 1.5, step: 0.1 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
