id: end_of_day_drift
name: End-of-day drift
family: time_microstructure
horizon: intraday
thesis: "Capture the last-hour directional drift driven by institutional MOC order flow."
watches: [close, sma, atr, avg_volume, time_of_day]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.3] }

entry:
  when:
    all_of:
      - { gt: ["close", "sma({entry_sma})"] }
      - { gt: ["avg_volume(20)", 1000000] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 3.0

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 0.8
  - time_stop:
      sessions: 1
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 2.0
  max_position_pct: 3.0
  max_gross_exposure: 25.0

param_grid:
  entry_sma: { min: 3, max: 10, step: 1, default: 5 }
  stop_atr: { min: 0.3, max: 0.7, step: 0.1, default: 0.5 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.3] }

peers_hint: sector_or_corr
default_universe:
  min_price: 10
  min_dollar_volume: 10000000
