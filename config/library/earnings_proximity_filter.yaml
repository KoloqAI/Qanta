id: earnings_proximity_filter
name: Earnings proximity filter
family: structural_filter
horizon: both
thesis: "Avoid entering new positions close to earnings announcements; event risk dominates signal quality."
watches: [close, days_to_event, avg_volume]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["days_to_event(earnings)", 5] }

entry:
  when:
    all_of:
      - { gt: ["days_to_event(earnings)", 5] }
      - { gt: ["avg_volume(20)", 500000] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 5.0

exits:
  - stop_loss:
      atr_mult: 1.5
  - time_stop:
      sessions: 10
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 4.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  min_days: { min: 3, max: 10, step: 1 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["days_to_event(earnings)", 5] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
