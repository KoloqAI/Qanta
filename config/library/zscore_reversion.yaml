id: zscore_reversion
name: Z-score mean-reversion
family: mean_reversion
horizon: swing
thesis: "Buy when z-score falls below -2; statistical reversion to the mean in liquid, moderate-vol names."
watches: [close, zscore, atr, avg_volume, realized_vol]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { between: ["realized_vol(20)", 0.10, 0.45] }

entry:
  when:
    all_of:
      - { lt: ["zscore({zscore_period})", "{zscore_entry}"] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 5.0

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 2.5
  - time_stop:
      sessions: 12
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 4.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  zscore_period: { min: 10, max: 40, step: 5, default: 20 }
  zscore_entry: { min: -3.0, max: -1.5, step: 0.5, default: -2.0 }
  stop_atr: { min: 1.0, max: 2.0, step: 0.25, default: 1.5 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { lt: ["zscore(20)", -1.5] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
