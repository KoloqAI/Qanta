id: ma_crossover_trend
name: Moving average crossover trend
family: momentum_trend
horizon: swing
thesis: "Go long when the fast MA crosses above the slow MA; ride the trend with a trailing stop."
watches: [close, sma, ema, atr, avg_volume, adx]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["adx(14)", 18] }

entry:
  when:
    all_of:
      - { crosses_above: ["ema({fast_period})", "sma({slow_period})"] }
      - { gt: ["adx(14)", 20] }
  action: enter_long
  sizing:
    fixed_pct:
      pct: 5.0

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - trailing_stop:
      atr_mult: 2.5
  - time_stop:
      sessions: 30
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 5.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  fast_period: { min: 5, max: 15, step: 2, default: 10 }
  slow_period: { min: 20, max: 50, step: 5, default: 30 }
  stop_atr: { min: 1.5, max: 3.0, step: 0.25, default: 2.0 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["ema(10)", "sma(30)"] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
