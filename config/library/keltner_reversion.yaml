id: keltner_reversion
name: Keltner channel reversion
family: volatility
horizon: both
thesis: "Mean-revert when price touches the lower Keltner channel in a ranging, moderate-vol regime."
watches: [close, ema, atr, avg_volume, realized_vol]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { between: ["realized_vol(20)", 0.10, 0.40] }

entry:
  when:
    all_of:
      - { lt: ["close", "ema(20)"] }
      - { between: ["realized_vol(20)", 0.10, 0.40] }
  action: enter_long
  sizing:
    vol_scaled:
      target_vol: 0.08

exits:
  - stop_loss:
      atr_mult: 1.2
  - take_profit:
      atr_mult: 2.0
  - time_stop:
      sessions: 8
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 3.5
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  ema_period: { min: 15, max: 30, step: 5 }
  atr_mult: { min: 1.0, max: 2.5, step: 0.5 }
  stop_atr: { min: 0.8, max: 1.5, step: 0.1 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { lt: ["close", "ema(20)"] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
