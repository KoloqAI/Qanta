id: sector_relative_strength
name: Sector relative strength
family: cross_sectional
horizon: swing
thesis: "Rotate into the strongest sector names; relative strength persists over multi-week horizons."
watches: [close, sma, avg_volume, adx]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["close", "sma(50)"] }

entry:
  when:
    all_of:
      - { gt: ["sma({fast_sma})", "sma({slow_sma})"] }
      - { gt: ["close", "sma(50)"] }
  action: enter_long
  sizing:
    vol_scaled:
      target_vol: 0.10

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - trailing_stop:
      atr_mult: 2.5
  - time_stop:
      sessions: 20
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 5.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  fast_sma: { min: 5, max: 15, step: 5, default: 10 }
  slow_sma: { min: 20, max: 40, step: 10, default: 30 }
  stop_atr: { min: 1.5, max: 3.0, step: 0.5, default: 2.0 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 500000] }
    - { gt: ["sma(10)", "sma(30)"] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
