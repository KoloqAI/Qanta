id: range_fade
name: Range mean-reversion
family: mean_reversion
horizon: both
thesis: "Oversold extensions to a range edge fade; liquidity provision vs transient noise."
watches: [close, range_detect, atr, rsi, avg_volume, realized_vol]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { between: ["realized_vol(20)", 0.12, 0.45] }

entry:
  when:
    all_of:
      - { lt: ["rsi(14)", "{entry_rsi}"] }
      - { lt: ["close", "rolling_low({rolling_n})"] }
  action: enter_long
  sizing:
    vol_scaled:
      target_vol: 0.10

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 2.0
  - time_stop:
      sessions: 7
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 3.0
  max_position_pct: 5.0
  max_gross_exposure: 40.0

param_grid:
  rolling_n: { min: 10, max: 40, step: 5, default: 20 }
  entry_rsi: { min: 20, max: 40, step: 5, default: 30 }
  stop_atr: { min: 0.6, max: 1.4, step: 0.2, default: 0.9 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { lt: ["zscore(20)", -1.0] }

peers_hint: sector_or_corr
default_universe:
  min_price: 5
  min_dollar_volume: 5000000
