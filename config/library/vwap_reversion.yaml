id: vwap_reversion
name: VWAP reversion
family: mean_reversion
horizon: intraday
thesis: "Buy when price dips significantly below VWAP on high volume; institutional flow anchors to VWAP."
watches: [close, vwap, atr, avg_volume, volume]

regime:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { gt: ["atr(14)", 0.3] }

entry:
  when:
    all_of:
      - { lt: ["close", "vwap({vwap_period})"] }
      - { gt: ["volume", "avg_volume(20)"] }
  action: enter_long
  sizing:
    vol_scaled:
      target_vol: 0.08

exits:
  - stop_loss:
      atr_mult: "{stop_atr}"
  - take_profit:
      atr_mult: 1.2
  - time_stop:
      sessions: 1
  - regime_break_exit: true

risk:
  per_trade_stop_pct: 2.5
  max_position_pct: 4.0
  max_gross_exposure: 30.0

param_grid:
  vwap_period: { min: 10, max: 30, step: 5, default: 20 }
  stop_atr: { min: 0.5, max: 1.0, step: 0.1, default: 0.7 }

scan:
  all_of:
    - { gt: ["avg_volume(20)", 1000000] }
    - { lt: ["close", "vwap(20)"] }

peers_hint: sector_or_corr
default_universe:
  min_price: 10
  min_dollar_volume: 10000000
